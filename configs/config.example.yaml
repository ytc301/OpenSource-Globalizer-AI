# OpenSource Globalizer AI 配置示例
# 复制此文件为 .globalizer.yaml 并修改

# 默认目标语言
languages:
  - zh-CN
  - ja
  - ko
  - es

# 翻译输出目录
output_dir: docs

# 默认模型
model: gpt-4o

# SQLite 数据库路径 (GORM 驱动)
db_path: ~/.globalizer/globalizer.db

# OpenAI API 配置
openai:
  # API Key (优先使用环境变量 OPENAI_API_KEY)
  # api_key: sk-...
  base_url: https://api.openai.com/v1

# 保留规则
preserve:
  code_blocks: true  # 不翻译代码块 (goldmark AST 识别)
  links: true        # 保留链接
  badges: true       # 保留 Badge 标记
  html_tags: true    # 保留 HTML 标签

# HTTP 服务配置 (serve 命令)
server:
  port: 8080
  mode: debug
