name: "OpenSource Globalizer AI"
description: "AI-powered README translation and localization for open-source projects"
author: "OpenSource Globalizer AI Contributors"

branding:
  icon: "globe"
  color: "blue"

inputs:
  api-key:
    description: "OpenAI API Key"
    required: true
  languages:
    description: "目标语言，逗号分隔"
    required: false
    default: "zh-CN"
  target:
    description: "要翻译的文件路径"
    required: false
    default: "README.md"
  output-dir:
    description: "翻译输出目录"
    required: false
    default: "docs"
  model:
    description: "OpenAI 模型名称"
    required: false
    default: "gpt-4o"
  base-url:
    description: "API 地址"
    required: false
    default: "https://api.openai.com/v1"
  version:
    description: "globalizer 版本"
    required: false
    default: "v0.1.0"
  auto-pr:
    description: "是否自动创建 Pull Request"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.23"

    - name: Install Globalizer
      shell: bash
      run: go install github.com/ytc301/OpenSource-Globalizer-AI/cmd/globalizer@${{ inputs.version }}

    - name: Run Translation
      shell: bash
      run: |
        globalizer translate ${{ inputs.target }} \
          --lang ${{ inputs.languages }} \
          --output ${{ inputs.output-dir }} \
          --model ${{ inputs.model }} \
          --base-url ${{ inputs.base-url }} \
          --api-key ${{ inputs.api-key }}

    - name: Create Pull Request
      if: inputs.auto-pr == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        commit-message: "🌍 i18n: Auto-translate ${{ inputs.target }}"
        title: "🌍 i18n: Auto-translate ${{ inputs.target }}"
        body: |
          ## 🌍 AI Translation

          由 [OpenSource Globalizer AI](https://github.com/ytc301/opensource-globalizer) 自动翻译。

          **目标语言**: ${{ inputs.languages }}
          **模型**: ${{ inputs.model }}
        branch: i18n/translate-${{ github.run_id }}
        labels: i18n
