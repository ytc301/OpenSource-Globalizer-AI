name: "OpenSource Globalizer AI"
description: "AI-powered README translation and localization for open-source projects"
author: "OpenSource Globalizer AI Contributors"

branding:
  icon: "globe"
  color: "blue"

inputs:
  openai-key:
    description: "OpenAI API Key"
    required: true
  languages:
    description: "目标语言，逗号分隔 (e.g. zh-CN,ja,ko)"
    required: false
    default: "zh-CN"
  target:
    description: "要翻译的文件路径"
    required: false
    default: "README.md"
  output-dir:
    description: "翻译输出目录"
    required: false
    default: "docs"
  model:
    description: "OpenAI 模型名称"
    required: false
    default: "gpt-4o"
  auto-pr:
    description: "是否自动创建 Pull Request"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"

    - name: Run Globalizer
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-key }}
      run: |
        go run ./cmd/globalizer translate ${{ inputs.target }} \
          --lang ${{ inputs.languages }} \
          --output ${{ inputs.output-dir }} \
          --model ${{ inputs.model }}

    - name: Create Pull Request
      if: inputs.auto-pr == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        commit-message: "🌍 i18n: Translate ${{ inputs.target }} to ${{ inputs.languages }}"
        title: "🌍 i18n: Auto-translate ${{ inputs.target }}"
        body: |
          ## 🌍 AI Translation

          由 [OpenSource Globalizer AI](https://github.com/ytc301/opensource-globalizer) 自动翻译。

          **目标语言**: ${{ inputs.languages }}
          **模型**: ${{ inputs.model }}

          > 🤖 此 PR 由 AI 自动生成。如有问题请提交 Issue。
        branch: i18n/translate-${{ github.run_id }}
        labels: i18n, automated
